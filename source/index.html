<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#17251f" />
    <title>DigiCanji</title>
    <link rel="stylesheet" href="./styles.css" />
    <script id="digicanji-quiz-data" type="application/json">
{
  "quizId": "digicanji-demo-v1",
  "title": "DigiCanji",
  "questions": [
    {"front":"改善を","prompt":"ハカル","back":"。","answer":"図る","explanation":"しようと考えること"},
    {"front":"","prompt":"アツイ","back":"本を読む。","answer":"厚い","explanation":"物を横から見たときの幅がある"},
    {"front":"選手の","prompt":"コウタイ","back":"を知らせる。","answer":"交代","explanation":"人の役割などを入れ替えること"}
  ]
}
    </script>
    <script src="./stroke-counts.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main id="app" class="app" data-layout="horizontal" data-handedness="right" aria-labelledby="app-title">
      <header class="app-header">
        <h1 id="app-title" class="app-title">DigiCanji</h1>
        <div class="progress-wrap" aria-live="polite">
          <span id="progress-text" class="progress-text">1 / 1</span>
          <span class="progress-track" aria-hidden="true"><span id="progress-bar" class="progress-bar"></span></span>
        </div>
        <button id="settings-button" class="icon-button settings-button" type="button" aria-label="設定を開く" title="設定">⚙</button>
      </header>

      <div id="screen-shell" class="screen-shell">
        <section id="learning-screen" class="learning-screen">
        <section class="question-answer-panel" aria-label="問題文と認識結果">
          <p id="question-text" class="question-text" aria-live="polite"></p>
          <output id="recognized-text" class="result-box" aria-live="polite"></output>
        </section>

        <section class="pad-stage" aria-label="手書き入力">
          <canvas id="handwriting-pad" aria-label="手書き入力パッド"></canvas>

          <div class="review-control">
            <button id="review-button" class="pad-overlay-button review-button" type="button" aria-expanded="false" aria-controls="review-menu">
              見直し
            </button>
            <div id="review-menu" class="review-menu" hidden></div>
          </div>

          <button id="advance-button" class="pad-overlay-button advance-button" type="button">進む</button>
        </section>

        <nav class="actions" aria-label="操作盤">
          <button id="undo-button" class="action-button secondary-button" type="button" aria-keyshortcuts="Z" disabled>1画消す</button>
          <button id="clear-button" class="action-button primary-button" type="button">クリア</button>
          <div id="slot-position" class="slot-position" aria-live="polite" aria-label="現在の文字枠">1 / 1</div>
        </nav>
      </section>

      <section id="result-screen" class="result-screen" hidden aria-labelledby="result-title">
        <header class="result-header">
          <p class="result-kicker">今回の結果</p>
          <h2 id="result-title" class="result-title">答え合わせ</h2>
        </header>
        <ol id="result-list" class="result-list"></ol>
        <div id="score-summary" class="score-summary" aria-live="polite"></div>
        <button id="retry-button" class="retry-button" type="button" hidden>もっと</button>
      </section>
      </div>
    </main>

    <div id="settings-overlay" class="overlay" hidden>
      <section class="settings-dialog dialog-card" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <header class="dialog-header">
          <h2 id="settings-title">設定</h2>
          <button id="settings-close-button" class="dialog-close" type="button" aria-label="設定を閉じる">×</button>
        </header>

        <div class="settings-group">
          <label class="settings-label" for="layout-select">画面レイアウト</label>
          <select id="layout-select" class="settings-select">
            <option value="horizontal">横書き</option>
            <option value="vertical-wide">縦書き・ワイド</option>
            <option value="vertical-portable">縦書き・ポータブル</option>
          </select>
          <p class="settings-note">ポータブルはスマートフォンを横に持って使えるよう、画面全体を90度回転して表示します。</p>
        </div>

        <div class="settings-group">
          <span class="settings-label">利き手</span>
          <div class="segmented-control" role="radiogroup" aria-label="利き手">
            <label><input type="radio" name="handedness" value="right" checked />右利き</label>
            <label><input type="radio" name="handedness" value="left" />左利き</label>
          </div>
        </div>

        <div class="settings-group danger-zone">
          <button id="clear-stats-button" class="text-button" type="button">学習記録を消去</button>
        </div>
      </section>
    </div>

    <div id="explanation-overlay" class="overlay" hidden>
      <section class="explanation-dialog dialog-card" role="dialog" aria-modal="true" aria-labelledby="explanation-title">
        <p class="explanation-kicker">解説</p>
        <h2 id="explanation-title" class="explanation-answer"></h2>
        <p id="explanation-text" class="explanation-text"></p>
        <div class="explanation-actions">
          <button id="trace-now-button" class="explanation-action primary-button" type="button">いま書く</button>
          <button id="explanation-close-button" class="explanation-action secondary-button" type="button">閉じる</button>
        </div>
      </section>
    </div>

    <div id="trace-overlay" class="overlay trace-overlay" hidden data-layout="horizontal" data-handedness="right" data-portable-rotated="false">
      <section id="trace-dialog" class="trace-dialog" role="dialog" aria-modal="true" aria-labelledby="trace-title">
        <h2 id="trace-title" class="visually-hidden">なぞり書き</h2>
        <div id="trace-surface" class="trace-surface">
          <section class="trace-question-answer-panel" aria-label="問題文とフリー認識枠">
            <p id="trace-question-text" class="trace-question-text"></p>
            <output class="trace-result-box" aria-label="フリー認識枠"><span class="trace-free-label">フリー</span></output>
          </section>

          <section id="trace-pad-stage" class="trace-pad-stage" aria-label="なぞり書きパッド">
            <canvas id="trace-pad" aria-label="模範解答をなぞる手書きパッド"></canvas>
            <button id="trace-ok-button" class="trace-ok-button" type="button">OK</button>
          </section>

          <nav class="trace-actions" aria-label="なぞり書き操作盤">
            <button id="trace-undo-button" class="action-button secondary-button" type="button" disabled>1画消す</button>
            <button id="trace-clear-button" class="action-button primary-button" type="button">クリア</button>
          </nav>
        </div>
      </section>
    </div>

    <noscript>このアプリの利用にはJavaScriptが必要です。</noscript>
  </body>
</html>
